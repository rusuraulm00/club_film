        th, td{
            padding:15px;
        }
        th{
            background-color: ivory;
        }
        div{
            display: flex;
            border:25px white double;
            padding:20px;
            width:110px;
            position:fixed;
            bottom: 50px;
            left: 10px;
        }
    </style>
</head>

<body>
    <nav>

    <div id="div">
        <p>
            <button onclick="myFunctionRegular()">Regular</button> 
            <button onclick="myFunctionVIP()">VIP</button>
        </p>
    </div>
    <script>
        function myFunctionRegular() {
            var x = document.getElementsByClassName("regular");
            for (var i = 0; i < x.length; i++) {
                x[i].style.backgroundColor="blue";
            }
        }
        function myFunctionVIP() {
            var x = document.getElementsByClassName("vip");
            for (var i = 0; i < x.length; i++) {
                x[i].style.backgroundColor="green";
            }
        }
    </script>
